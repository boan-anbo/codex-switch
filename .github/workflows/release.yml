name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GORELEASER_VERSION: v2.15.4
  SHFMT_VERSION: v3.12.0
  STATICCHECK_VERSION: v0.7.0
  GOVULNCHECK_VERSION: v1.3.0
  GOTOOLCHAIN: auto

jobs:
  native-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            shell: bash
            goos: linux
            goarch: amd64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            shell: bash
            goos: linux
            goarch: arm64
          - name: macos-amd64
            os: macos-15-intel
            shell: bash
            goos: darwin
            goarch: amd64
          - name: macos-arm64
            os: macos-15
            shell: bash
            goos: darwin
            goarch: arm64
          - name: windows-amd64
            os: windows-latest
            shell: pwsh
            goos: windows
            goarch: amd64
          - name: windows-arm64
            os: windows-11-arm
            shell: pwsh
            goos: windows
            goarch: arm64
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Show native Go target
        run: go env GOOS GOARCH
      - name: Check native Go target
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          actual="$(go env GOOS)/$(go env GOARCH)"
          expected="${{ matrix.goos }}/${{ matrix.goarch }}"
          if [ "$actual" != "$expected" ]; then
            echo "expected $expected, got $actual" >&2
            exit 1
          fi
      - name: Check native Go target
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $actual = "$(go env GOOS)/$(go env GOARCH)"
          $expected = "${{ matrix.goos }}/${{ matrix.goarch }}"
          if ($actual -ne $expected) {
            throw "expected $expected, got $actual"
          }
      - name: Check formatting
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files"
            echo "Run gofmt before releasing." >&2
            exit 1
          fi
      - name: Check formatting
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $files = gofmt -l .
          if ($files) {
            $files
            throw "Run gofmt before releasing."
          }
      - run: go test ./...
      - run: go vet ./...
      - name: Run race detector
        if: runner.os == 'Linux'
        run: go test -race ./...
      - name: Smoke install script
        if: matrix.shell == 'bash'
        shell: bash
        run: RUN_INSTALL_SMOKE=1 ./scripts/smoke.sh
      - name: Smoke install script
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $env:RUN_INSTALL_SMOKE = "1"
          $env:CODEX_HOME = "preserve-codex-home"
          $env:CODEX_SWITCH_CONFIG = "preserve-config"
          $env:CODEX_SWITCH_CACHE = "preserve-cache"
          ./scripts/smoke.ps1
          if (
            $env:CODEX_HOME -ne "preserve-codex-home" -or
            $env:CODEX_SWITCH_CONFIG -ne "preserve-config" -or
            $env:CODEX_SWITCH_CACHE -ne "preserve-cache"
          ) {
            throw "smoke.ps1 did not restore caller environment"
          }

  release-dry-run:
    needs: native-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --snapshot --clean
      - uses: actions/upload-artifact@v7
        with:
          name: snapshot-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  archive-smoke:
    needs: release-dry-run
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            shell: bash
            goos: linux
            goarch: amd64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            shell: bash
            goos: linux
            goarch: arm64
          - name: macos-amd64
            os: macos-15-intel
            shell: bash
            goos: darwin
            goarch: amd64
          - name: macos-arm64
            os: macos-15
            shell: bash
            goos: darwin
            goarch: arm64
          - name: windows-amd64
            os: windows-latest
            shell: pwsh
            goos: windows
            goarch: amd64
          - name: windows-arm64
            os: windows-11-arm
            shell: pwsh
            goos: windows
            goarch: arm64
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: snapshot-dist
          path: dist
      - name: Check native archive target
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          case "$(uname -s)" in
            Darwin) goos=darwin ;;
            Linux) goos=linux ;;
            *) echo "unsupported OS: $(uname -s)" >&2; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64 | amd64) goarch=amd64 ;;
            arm64 | aarch64) goarch=arm64 ;;
            *) echo "unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          actual="$goos/$goarch"
          expected="${{ matrix.goos }}/${{ matrix.goarch }}"
          if [ "$actual" != "$expected" ]; then
            echo "expected $expected, got $actual" >&2
            exit 1
          fi
      - name: Check native archive target
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $arch = $env:PROCESSOR_ARCHITECTURE
          switch -Regex ($arch) {
            "ARM64" { $arch = "arm64"; break }
            "AMD64|x86_64" { $arch = "amd64"; break }
            default { throw "unsupported architecture: $arch" }
          }
          $actual = "windows/$arch"
          $expected = "${{ matrix.goos }}/${{ matrix.goarch }}"
          if ($actual -ne $expected) {
            throw "expected $expected, got $actual"
          }
      - name: Smoke release archive
        if: matrix.shell == 'bash'
        shell: bash
        run: ./scripts/archive-smoke.sh
      - name: Smoke release archive
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $env:CODEX_SWITCH_RELEASE_DIR = "preserve-release-dir"
          $env:BIN_DIR = "preserve-bin"
          $env:CODEX_HOME = "preserve-codex-home"
          ./scripts/archive-smoke.ps1
          if (
            $env:CODEX_SWITCH_RELEASE_DIR -ne "preserve-release-dir" -or
            $env:BIN_DIR -ne "preserve-bin" -or
            $env:CODEX_HOME -ne "preserve-codex-home"
          ) {
            throw "archive-smoke.ps1 did not restore caller environment"
          }

  release:
    needs: archive-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Lint GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Check shell script syntax
        shell: bash
        run: |
          for script in scripts/*.sh; do
            sh -n "$script"
          done
      - name: Check shell script formatting
        run: go run mvdan.cc/sh/v3/cmd/shfmt@${{ env.SHFMT_VERSION }} -d -i 2 -ci scripts/*.sh
      - name: Check go.mod/go.sum tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files"
            echo "Run gofmt before releasing." >&2
            exit 1
          fi
      - run: go test ./...
      - run: go vet ./...
      - name: Run race detector
        run: go test -race ./...
      - name: Run Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@${{ env.STATICCHECK_VERSION }} ./...
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }} ./...
      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: check
      - name: Build snapshot release artifacts
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --snapshot --clean
      - name: Smoke snapshot archive
        shell: bash
        run: ./scripts/archive-smoke.sh
      - name: Publish draft release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
