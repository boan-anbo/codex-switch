version: 2

project_name: codex-switch

builds:
  - id: codex-switch
    main: .
    binary: codex-switch
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - SECURITY.md
      - skills/codex-switch/SKILL.md

checksum:
  name_template: checksums.txt

release:
  draft: true
